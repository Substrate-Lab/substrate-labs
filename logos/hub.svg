       cream filter handles color uniformly with the rest of the strip. -->
  <text x="360" y="115"
        text-anchor="middle"
        font-family="Arial Black, Helvetica, sans-serif"
        font-size="120"
        font-weight="900"
        letter-spacing="6">HUB</text>
  <text x="360" y="178"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="42"
        font-weight="500"
        letter-spacing="14">INTERNATIONAL</text>
</svg>
