<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 210" fill="#000">
  <!-- Google wordmark rendered as plain text; the marquee filter recolors it
       uniformly with the rest of the strip. Nominative use of the name. -->
  <text x="360" y="140"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="140"
        font-weight="500"
        letter-spacing="0">Google</text>
</svg>
